name: baby-registry CI

on:
  pull_request:
    paths:
      - "apps/baby-registry/**"
      - ".github/workflows/baby-registry-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/baby-registry/**"
      - ".github/workflows/baby-registry-ci.yml"

concurrency:
  group: baby-registry-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/baby-registry/apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/baby-registry/apps/backend/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1

  frontend:
    name: frontend (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/baby-registry/apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/baby-registry/apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
