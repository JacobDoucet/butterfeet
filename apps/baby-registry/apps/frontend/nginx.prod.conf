server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The DigitalOcean Load Balancer terminates TLS and is the only host that
  # should be able to reach this container's published port. Trust its
  # X-Forwarded-* headers so request logs and any future rate limiting see
  # the real client IP.
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # Security headers. HSTS is set at the DigitalOcean Load Balancer.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Hashed asset bundles are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # Brand and favicon assets get a sensible cache window.
  location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public" always;
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # SPA fallback — index.html itself must never be cached.
  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
