objects:
  - name: Registry
    fields:
      - name: ownerId
        type: Ref<OwnerUser>
        required: true
      - name: slug
        type: string
        required: true
      - name: title
        type: string
        required: true
      - name: parentNames
        type: string
      - name: dueDate
        type: timestamp
      - name: welcomeMessage
        type: string
      - name: themeColor
        type: string
      - name: coverImageUrl
        type: string
      - name: isPublic
        type: bool
      - name: addressAccessMode
        type: AddressAccessMode
      - name: shippingPolicyVersion
        type: int
      - name: shippingRecipientName
        type: string
      - name: shippingLine1
        type: string
      - name: shippingLine2
        type: string
      - name: shippingCity
        type: string
      - name: shippingRegion
        type: string
      - name: shippingPostalCode
        type: string
      - name: shippingCountry
        type: string
      - name: shippingDeliveryNotes
        type: string

    collection:
      - type: mongo
        name: registries

    indexes:
      - name: slug_unique
        unique: true
        fields:
          - name: slug
      - name: owner_idx
        fields:
          - name: ownerId

    http:
      endpoint: registries
      methods:
        - GET
        - POST
        - PATCH
        - DELETE

    abac:
      - name: OwnerId
        field: ownerId

    permissions:
      read:
        - rbac: Owner
          abac:
            - OwnerId
      write:
        - rbac: Owner
          abac:
            - OwnerId
