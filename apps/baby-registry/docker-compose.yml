services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: baby_registry
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3035}
    depends_on:
      - mongo
    ports:
      - "3036:8080"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3035:80"

volumes:
  mongo_data:
